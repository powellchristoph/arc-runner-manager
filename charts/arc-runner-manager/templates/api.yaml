{{- /*
  Secret for API tokens.
  Three options, in priority order:
    1. existingSecret — use a pre-existing secret (recommended for production)
    2. apiTokens      — JSON map of name→token, stored in a chart-managed secret
    3. apiKey         — legacy single token, stored as {"default":"<key>"}
*/ -}}
{{- /*
  Chart-managed kubeconfig Secret (only when api.kubeconfig is set and
  api.existingKubeconfigSecret is not).
*/ -}}
{{- if and .Values.api.kubeconfig (not .Values.api.existingKubeconfigSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-runner-manager.fullname" . }}-kubeconfig
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-runner-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  config: {{ .Values.api.kubeconfig | quote }}
---
{{- end }}
{{- if not .Values.api.existingSecret }}
{{- if and (not .Values.api.apiTokens) (not .Values.api.apiKey) (not .Values.api.allowReadonlyUnauthenticated) }}
  {{- fail "One of api.existingSecret, api.apiTokens, or api.apiKey must be set (or set api.allowReadonlyUnauthenticated=true for read-only public access with no write tokens)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-runner-manager.fullname" . }}-api-tokens
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-runner-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.api.apiTokens }}
  api-tokens: {{ .Values.api.apiTokens | quote }}
  {{- else if .Values.api.apiKey }}
  {{- /* Store as both a JSON map (for the API) and a raw value (for the frontend). */}}
  api-tokens: {{ printf "{\"default\":%q}" .Values.api.apiKey | quote }}
  api-key: {{ .Values.api.apiKey | quote }}
  {{- else }}
  {{- /* allowReadonlyUnauthenticated=true with no tokens: empty map, writes always 401. */}}
  api-tokens: "{}"
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arc-runner-manager.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-runner-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "arc-runner-manager.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "arc-runner-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "arc-runner-manager.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.api.existingSecret }}{{ .Values.api.existingSecret }}{{ else }}{{ include "arc-runner-manager.fullname" . }}-api-tokens{{ end }}
                  key: {{ .Values.api.existingSecretKey | default "api-tokens" }}
            - name: ARC_CHART_REPO
              value: {{ .Values.api.arc.chartRepo | quote }}
            - name: ARC_CHART_NAME
              value: {{ .Values.api.arc.chartName | quote }}
            - name: ARC_CHART_VERSION
              value: {{ .Values.api.arc.chartVersion | quote }}
            - name: ARC_CONTROLLER_NS
              value: {{ .Values.api.arc.controllerNamespace | quote }}
            - name: DEFAULT_MIN_RUNNERS
              value: {{ .Values.api.defaults.minRunners | quote }}
            - name: DEFAULT_MAX_RUNNERS
              value: {{ .Values.api.defaults.maxRunners | quote }}
            - name: DEFAULT_RUNNER_IMAGE
              value: {{ .Values.api.defaults.runnerImage | quote }}
            - name: DEFAULT_STORAGE_CLASS
              value: {{ .Values.api.defaults.storageClass | quote }}
            - name: DEFAULT_STORAGE_SIZE
              value: {{ .Values.api.defaults.storageSize | quote }}
            - name: DEFAULT_CPU_REQUEST
              value: {{ .Values.api.defaults.cpuRequest | quote }}
            - name: DEFAULT_CPU_LIMIT
              value: {{ .Values.api.defaults.cpuLimit | quote }}
            - name: DEFAULT_MEMORY_REQUEST
              value: {{ .Values.api.defaults.memoryRequest | quote }}
            - name: DEFAULT_MEMORY_LIMIT
              value: {{ .Values.api.defaults.memoryLimit | quote }}
            - name: ALLOW_READONLY_UNAUTHENTICATED
              value: {{ .Values.api.allowReadonlyUnauthenticated | quote }}
            {{- if or .Values.api.kubeconfig .Values.api.existingKubeconfigSecret }}
            - name: KUBECONFIG
              value: "/etc/kubeconfig/config"
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if or .Values.api.kubeconfig .Values.api.existingKubeconfigSecret }}
            - name: kubeconfig
              mountPath: /etc/kubeconfig
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if or .Values.api.kubeconfig .Values.api.existingKubeconfigSecret }}
        - name: kubeconfig
          secret:
            secretName: {{ if .Values.api.existingKubeconfigSecret }}{{ .Values.api.existingKubeconfigSecret }}{{ else }}{{ include "arc-runner-manager.fullname" . }}-kubeconfig{{ end }}
            items:
              - key: {{ .Values.api.existingKubeconfigSecretKey | default "config" }}
                path: config
        {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "arc-runner-manager.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-runner-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "arc-runner-manager.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api