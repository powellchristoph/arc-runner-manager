{{- if and .Values.frontend.apiKey (not .Values.frontend.existingApiKeySecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arc-runner-manager.fullname" . }}-frontend-api-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-runner-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.frontend.apiKey | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arc-runner-manager.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-runner-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "arc-runner-manager.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "arc-runner-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
      {{- with .Values.frontend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          env:
            - name: LISTEN_ADDR
              value: ":3000"
            - name: API_URL
              value: "http://{{ include "arc-runner-manager.fullname" . }}-api:{{ .Values.api.service.port }}"
            {{- if .Values.frontend.existingApiKeySecret }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.frontend.existingApiKeySecret }}
                  key: {{ .Values.frontend.existingApiKeySecretKey | default "api-key" }}
            {{- else if .Values.frontend.apiKey }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "arc-runner-manager.fullname" . }}-frontend-api-key
                  key: api-key
            {{- else if .Values.api.apiKey }}
            {{- /* Legacy: api.apiKey stores raw value in the api-tokens secret under "api-key" key */}}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "arc-runner-manager.apiSecretName" . }}
                  key: api-key
            {{- end }}
            {{- /* No API_KEY = multi-user mode: users authenticate via browser login form */}}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "arc-runner-manager.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-runner-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "arc-runner-manager.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- if .Values.frontend.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "arc-runner-manager.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arc-runner-manager.labels" . | nindent 4 }}
  {{- with .Values.frontend.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.frontend.ingress.className }}
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- end }}
  {{- if .Values.frontend.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.frontend.ingress.host | quote }}
      secretName: {{ .Values.frontend.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.frontend.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "arc-runner-manager.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
