# Default values for arc-runner-manager.
# Override in your own values file — do not edit this file directly in production.

# ── API backend ───────────────────────────────────────────────────────────────
api:
  image:
    repository: ghcr.io/your-org/arc-runner-manager-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  # ── Token authentication ────────────────────────────────────────────────────
  # Option A — supply a JSON token map directly (not recommended for production):
  #   apiTokens: '{"frontend":"tok-abc","ci":"tok-def","admin":"tok-xyz"}'
  # Option B — reference an existing Secret (recommended for production):
  #   existingSecret: "arc-runner-manager-tokens"
  #   existingSecretKey: "api-tokens"   # key inside the secret holding the JSON map
  # Option C — legacy single token (becomes {"default":"<key>"}):
  #   apiKey: "my-secret-token"
  #
  # The secret value must be a JSON object: {"name":"token-value", ...}
  apiTokens: ""          # JSON map of name→token. Takes precedence over apiKey.
  apiKey: ""             # Legacy single-token fallback. Ignored if apiTokens is set.
  existingSecret: ""     # Name of existing Secret. Takes precedence over both above.
  existingSecretKey: "api-tokens"

  # ── Read-only unauthenticated access ────────────────────────────────────────
  # When false (default): all requests require a Bearer token — single-key mode.
  # When true: GET requests are permitted without a token (read-only public access).
  #   POST / PUT / DELETE still require a valid token.
  #   Pair with frontend.apiKey="" so the frontend runs in multi-user mode and
  #   exposes a browser login form for write access.
  #
  # Example multi-user configuration:
  #   api:
  #     apiTokens: '{"admin":"tok-admin-xyz","ci":"tok-ci-abc"}'
  #     allowReadonlyUnauthenticated: true
  #   frontend:
  #     apiKey: ""   # omit to enable multi-user browser login
  allowReadonlyUnauthenticated: false

  # ── Kubeconfig ──────────────────────────────────────────────────────────────
  # The API needs a kubeconfig to talk to the cluster (Helm installs, k8s reads).
  # When running inside the cluster with a suitable ServiceAccount this is not
  # needed — leave all fields empty and the API will use in-cluster auth.
  #
  # When running outside the cluster (or when in-cluster RBAC is insufficient):
  #   Option A — supply the kubeconfig file content directly (chart-managed Secret):
  #     kubeconfig: |
  #       apiVersion: v1
  #       kind: Config
  #       ...
  #   Option B — reference a pre-existing Secret (recommended for production):
  #     existingKubeconfigSecret: "my-kubeconfig-secret"
  #     existingKubeconfigSecretKey: "config"   # key inside the Secret (default: "config")
  #
  # The kubeconfig is mounted read-only at /etc/kubeconfig/config and the
  # KUBECONFIG env var is set to that path.
  kubeconfig: ""                    # Raw kubeconfig YAML. Stored in a chart-managed Secret.
  existingKubeconfigSecret: ""      # Name of a pre-existing Secret containing the kubeconfig.
  existingKubeconfigSecretKey: "config"

  # Ingress for the API (typically internal / restricted)
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: "arc-api.example.com"
    tls:
      enabled: false
      secretName: "arc-api-tls"

  # ARC chart configuration
  arc:
    chartRepo: "oci://ghcr.io/actions/actions-runner-controller-charts"
    chartName: "gha-runner-scale-set"
    chartVersion: "0.13.1"
    controllerNamespace: "arc-system"

  # Platform-wide runner defaults (teams override per scale set)
  defaults:
    minRunners: 0
    maxRunners: 10
    runnerImage: "ghcr.io/actions/actions-runner:2.317.0"
    storageClass: "standard"
    storageSize: "1Gi"
    cpuRequest: "500m"
    cpuLimit: "2"
    memoryRequest: "1Gi"
    memoryLimit: "4Gi"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/your-org/arc-runner-manager-frontend
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  # ── Frontend authentication mode ────────────────────────────────────────────
  # Single-key mode (default): set apiKey to a token that exists in api.apiTokens
  # (or api.apiKey). The frontend injects it server-side; no browser login needed.
  #
  # Multi-user mode: leave apiKey empty and set api.allowReadonlyUnauthenticated=true.
  # Unauthenticated users get read-only access; users log in via a browser token form.
  #
  # To use a pre-existing Secret for the frontend token:
  #   existingApiKeySecret: "my-secret"
  #   existingApiKeySecretKey: "api-key"
  apiKey: ""                    # Token for single-key mode. Empty = multi-user mode.
  existingApiKeySecret: ""      # Pre-existing Secret containing the frontend token.
  existingApiKeySecretKey: "api-key"

  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: "arc-runners.example.com"
    tls:
      enabled: false
      secretName: "arc-runners-tls"

  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"

  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── RBAC ──────────────────────────────────────────────────────────────────────
rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}