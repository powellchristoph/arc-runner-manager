# Default values for arc-runner-manager.
# Override in your own values file — do not edit this file directly in production.

# ── API backend ───────────────────────────────────────────────────────────────
api:
  image:
    repository: ghcr.io/your-org/arc-runner-manager-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  # Token authentication.
  # Option A — supply a JSON token map directly (not recommended for production):
  #   apiTokens: '{"frontend":"tok-abc","ci":"tok-def","admin":"tok-xyz"}'
  # Option B — reference an existing Secret (recommended):
  #   existingSecret: "arc-runner-manager-tokens"
  #   existingSecretKey: "api-tokens"   # key inside the secret holding the JSON
  #
  # The secret value must be a JSON object: {"name":"token-value", ...}
  # Legacy single-token: set apiKey instead (becomes {"default":"<key>"})
  apiTokens: ""          # JSON map of name→token. Takes precedence over apiKey.
  apiKey: ""             # Legacy single-token fallback. Ignored if apiTokens is set.
  existingSecret: ""     # Name of existing Secret. Takes precedence over both above.
  existingSecretKey: "api-tokens"

  # Ingress for the API (typically internal / restricted)
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: "arc-api.example.com"
    tls:
      enabled: false
      secretName: "arc-api-tls"

  # ARC chart configuration
  arc:
    chartRepo: "oci://ghcr.io/actions/actions-runner-controller-charts"
    chartName: "gha-runner-scale-set"
    chartVersion: "0.9.3"
    controllerNamespace: "arc-system"

  # Platform-wide runner defaults (teams override per scale set)
  defaults:
    minRunners: 0
    maxRunners: 10
    runnerImage: "ghcr.io/actions/actions-runner:2.317.0"
    storageClass: "standard"
    storageSize: "1Gi"
    cpuRequest: "500m"
    cpuLimit: "2"
    memoryRequest: "1Gi"
    memoryLimit: "4Gi"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/your-org/arc-runner-manager-frontend
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    host: "arc-runners.example.com"
    tls:
      enabled: false
      secretName: "arc-runners-tls"

  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"

  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── RBAC ──────────────────────────────────────────────────────────────────────
rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}